<!DOCTYPE html>
<html lang="pt-BR">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 Downloader de Lixos</title>
<style>
    /* Reset básico */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Poppins', 'Segoe UI', sans-serif; /* Fonte mais moderna */
        background: #0f172a; /* Fundo azul escuro sólido, mais profissional */
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        color: #f8fafc;
    }

    .container {
        background: #1e293b; /* Fundo do container cinza escuro */
        border-radius: 24px;
        padding: 30px;
        width: 100%;
        max-width: 1100px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.05);
        animation: slideIn 0.5s ease-out forwards;
    }

    @keyframes slideIn {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* HEADER */
    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
    }

    .header h1 {
        font-size: 2rem;
        font-weight: 700;
        color: #f1f5f9;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    /* TABS */
    .tabs {
        display: flex;
        gap: 12px;
        margin-bottom: 30px;
    }

    .tab-btn {
        padding: 10px 24px;
        border-radius: 12px;
        background: transparent;
        border: 1px solid #334155;
        cursor: pointer;
        color: #94a3b8;
        font-weight: 600;
        transition: all 0.2s ease;
        flex: 1;
        text-align: center;
    }

    .tab-btn:hover {
        background: #334155;
        color: #fff;
    }

    .tab-btn.active {
        background: #3b82f6; /* Azul vibrante */
        color: white;
        border-color: #3b82f6;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    /* GRID DE CARDS */
    .file-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 16px;
    }

    .file-card {
        background: #0f172a;
        border-radius: 16px;
        padding: 20px;
        border: 1px solid #1e293b;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .file-card:hover {
        border-color: #3b82f6;
        transform: translateY(-4px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .file-card .top-info {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
    }

    .file-card .file-name {
        font-weight: 600;
        font-size: 1rem;
        word-break: break-all;
    }

    .file-card .file-size {
        font-size: 0.8rem;
        color: #64748b;
        margin-top: 4px;
    }

    /* STATUS BADGES (Círculos coloridos) */
    .status-container {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 12px 0;
        font-size: 0.85rem;
        font-weight: 500;
    }

    .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
    }
    
    .status-working { color: #4ade80; } .status-working .status-dot { background: #4ade80; }
    .status-broken { color: #f87171; } .status-broken .status-dot { background: #f87171; }
    .status-updating { color: #60a5fa; } .status-updating .status-dot { background: #60a5fa; }
    .status-unknown { color: #64748b; } .status-unknown .status-dot { background: #64748b; }

    /* BOTÕES */
    .file-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
    }

    .btn {
        padding: 8px 0;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.85rem;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
    }

    .btn-execute {
        background: #3b82f6;
        color: white;
    }

    .btn-execute:hover { background: #2563eb; }

    .btn-download {
        background: #1e293b;
        color: #cbd5e1;
        border: 1px solid #334155;
    }

    .btn-download:hover {
        background: #334155;
        color: white;
    }

    /* STATS & TOAST - Mantenha o que você já tem, apenas ajuste as cores */
</style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>📦 Downloader de Lixos</h1>
                <div class="subtitle">Gerenciador de Executores e Scripts</div>
            </div>
            <span class="icon">⚡</span>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('executors')">🚀 Executores</button>
            <button class="tab-btn" onclick="switchTab('scripts')">📜 Scripts</button>
            <button class="tab-btn" onclick="refreshAll()">🔄 Atualizar</button>
        </div>

        <!-- Executors Tab -->
        <div id="executors" class="content active">
            <div id="executor-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px;">Carregando executores...</p>
                </div>
            </div>
        </div>

        <!-- Scripts Tab -->
        <div id="scripts" class="content">
            <div id="script-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 15px;">Carregando scripts...</p>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-item">
                <div class="number" id="totalExecutors">0</div>
                <div class="label">Executores</div>
            </div>
            <div class="stat-item">
                <div class="number" id="totalScripts">0</div>
                <div class="label">Scripts</div>
            </div>
            <div class="stat-item">
                <div class="number" id="totalFiles">0</div>
                <div class="label">Total Arquivos</div>
            </div>
            <div class="stat-item">
                <div class="number" id="totalWorking">0</div>
                <div class="label">✅ Working</div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        // Função para alternar abas
        function switchTab(tabName) {
            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelectorAll('.tab-btn')[['executors','scripts','refresh'].indexOf(tabName)].classList.add('active');
        }

        // Função para mostrar toast
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.borderColor = type === 'error' ? '#ef4444' : type === 'success' ? '#10b981' : 'rgba(255,255,255,0.1)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Função para obter status
        function getStatusBadge(status) {
            const statusMap = {
                'working': '<span class="status-badge status-working">✅ Working</span>',
                'broken': '<span class="status-badge status-broken">❌ Broken</span>',
                'updating': '<span class="status-badge status-updating">🔄 Updating</span>'
            };
            return statusMap[status] || '<span class="status-badge status-unknown">❓ Unknown</span>';
        }

        // Função para carregar dados
        function loadData() {
            // Carregar executores
            fetch('/api/executors')
                .then(response => response.json())
                .then(data => {
                    const list = document.getElementById('executor-list');
                    if (data.length === 0) {
                        list.innerHTML = `
                            <div class="empty-state">
                                <div class="emoji">📭</div>
                                <p>Nenhum executor encontrado</p>
                            </div>
                        `;
                    } else {
                        list.innerHTML = `
                            <div class="file-grid">
                                ${data.map(item => `
                                    <div class="file-card">
                                        <div class="file-icon">${item.emoji || '⚡'}</div>
                                        <div class="file-name">${item.name}</div>
                                        <div class="file-size">${item.size || 'N/A'}</div>
                                        ${getStatusBadge(item.status)}
                                        <div class="file-actions">
                                            <button class="btn btn-execute" onclick="executeFile('${item.path}')">▶ Executar</button>
                                            <button class="btn btn-download" onclick="downloadFile('${item.path}')">⬇ Baixar</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                    document.getElementById('totalExecutors').textContent = data.length;
                    updateStats();
                })
                .catch(() => {
                    document.getElementById('executor-list').innerHTML = `
                        <div class="empty-state">
                            <div class="emoji">⚠️</div>
                            <p>Erro ao carregar executores</p>
                        </div>
                    `;
                });

            // Carregar scripts
            fetch('/api/scripts')
                .then(response => response.json())
                .then(data => {
                    const list = document.getElementById('script-list');
                    if (data.length === 0) {
                        list.innerHTML = `
                            <div class="empty-state">
                                <div class="emoji">📭</div>
                                <p>Nenhum script encontrado</p>
                            </div>
                        `;
                    } else {
                        list.innerHTML = `
                            <div class="file-grid">
                                ${data.map(item => `
                                    <div class="file-card">
                                        <div class="file-icon">${item.emoji || '📜'}</div>
                                        <div class="file-name">${item.name}</div>
                                        <div class="file-size">${item.size || 'N/A'}</div>
                                        <div class="file-actions">
                                            <button class="btn btn-execute" onclick="viewScript('${item.path}')">👁 Ver</button>
                                            <button class="btn btn-download" onclick="downloadFile('${item.path}')">⬇ Baixar</button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                    document.getElementById('totalScripts').textContent = data.length;
                    updateStats();
                })
                .catch(() => {
                    document.getElementById('script-list').innerHTML = `
                        <div class="empty-state">
                            <div class="emoji">⚠️</div>
                            <p>Erro ao carregar scripts</p>
                        </div>
                    `;
                });
        }

        function updateStats() {
            const total = parseInt(document.getElementById('totalExecutors').textContent) + 
                        parseInt(document.getElementById('totalScripts').textContent);
            document.getElementById('totalFiles').textContent = total;
        }

        function refreshAll() {
            showToast('🔄 Atualizando...', 'info');
            loadData();
            setTimeout(() => showToast('✅ Atualizado!', 'success'), 500);
        }

        function executeFile(path) {
            fetch(`/run/${path}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showToast(`✅ ${data.message}`, 'success');
                    } else {
                        showToast(`❌ ${data.message}`, 'error');
                    }
                })
                .catch(() => showToast('❌ Erro ao executar', 'error'));
        }

        function downloadFile(path) {
            fetch(`/download/${path}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Em vez de só mostrar o toast, vamos mostrar o caminho exato onde foi parar!
                        showToast(`✅ Baixado com sucesso!\n${data.message}`, 'success');
                    } else {
                        showToast(`❌ ${data.message}`, 'error');
                    }
                })
                .catch(() => showToast('❌ Erro de conexão com o servidor', 'error'));
        }

        function viewScript(path) {
            fetch(`/view/${path}`)
                .then(response => response.text())
                .then(content => {
                    alert('📜 Conteúdo do Script:\n\n' + content.substring(0, 1000) + (content.length > 1000 ? '\n...' : ''));
                })
                .catch(() => showToast('❌ Erro ao ler script', 'error'));
        }

        // Carregar dados ao iniciar
        loadData();
    </script>
</body>
</html>
